spring:
  application:
    name: master-data-service

  datasource:
    url: jdbc:postgresql://localhost:5432/devdb
    username: masterdata_user
    password: masterdata123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        default_schema: masterdata

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

server:
  port: 8080